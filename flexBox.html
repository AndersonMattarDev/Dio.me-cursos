<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira Pagina</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(12, 12, 12, 0.1);
        }
        

        .flex{
            display: flex;
        }
        .item{
            width: 80px;
            height: 80px;
            background-color: rgb(173, 55, 173);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 5px;
            padding: 10px;            
        }       
        .item:hover{
            background-color: rgb(173, 55, 173, 0.5);
            cursor: pointer;
        }
        .item:nth-child(1):hover{
             background-color: rgb(55, 173, 173);
            
        }

        input:focus{
            border-color: rgb(173, 55, 173);
            background-color: rgb(173, 55, 173, 0.1);
        }

        @media (max-width: 450px) {
            body{
            background-color: rgba(29, 28, 28, 0.986);
            color: white;
            }
            .flex{
               flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <hr>
    <h2>Flex Box</h2>
    <div class="flex">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
    </div>

    <div>
        <input>
    </div>

</body>
